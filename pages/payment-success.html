<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ParamGuard - Оплата успешна</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/header.css">
    <link rel="stylesheet" href="../css/modal.css">
    <style>
        .success-container {
            max-width: 500px;
            margin: 0 auto;
            text-align: center;
        }
        
        .success-card {
            background: white;
            border-radius: 24px;
            padding: 50px 40px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        
        .success-icon {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #52c41a, #389e0d);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            font-size: 48px;
            color: white;
        }
        
        .success-card h1 {
            font-size: 28px;
            color: #333;
            margin-bottom: 15px;
        }
        
        .success-card p {
            color: #666;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        
        .policy-number {
            background: #f8f7ff;
            border-radius: 12px;
            padding: 15px;
            margin: 20px 0;
            font-size: 18px;
            font-weight: 600;
            color: #764ba2;
        }
        
        .btn-primary {
            display: inline-block;
            padding: 14px 30px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-weight: 600;
            margin-top: 20px;
            transition: all 0.3s;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(118,75,162,0.3);
        }
        
        .btn-secondary {
            display: inline-block;
            padding: 14px 30px;
            background: white;
            color: #764ba2;
            border: 2px solid #764ba2;
            text-decoration: none;
            border-radius: 10px;
            font-weight: 600;
            margin-left: 15px;
            transition: all 0.3s;
        }
        
        .btn-secondary:hover {
            background: #764ba2;
            color: white;
        }
        
        .loader {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid #764ba2;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="header"></div>
    
    <main class="main-content">
        <div class="success-container">
            <div class="success-card">
                <div class="success-icon">
                    <i class="fas fa-check"></i>
                </div>
                <h1>Оплата прошла успешно!</h1>
                <p>Ваш страховой полис активирован.<br>Документы отправлены на вашу электронную почту.</p>
                
                <div id="policyInfo" class="policy-number">
                    <i class="fas fa-spinner fa-spin"></i> Загрузка информации о полисе...
                </div>
                
                <div>
                    <a href="../index.html" class="btn-primary">На главную</a>
                    <a href="insurance-travel.html" class="btn-secondary">Оформить еще</a>
                </div>
            </div>
        </div>
    </main>
    
    <div id="footer"></div>
    <div id="notification"></div>
    <div id="loginModal" class="modal" style="display: none;"></div>
    <div id="registerModal" class="modal" style="display: none;"></div>
    <div id="profileModal" class="modal modal-large" style="display: none;"></div>

    <script src="../js/global.js"></script>
    <script src="../js/common-auth.js"></script>
    
    <script>
        function getPolicyIdFromUrl() {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get('policy_id');
        }
        
        async function loadPolicyInfo() {
            const policyId = getPolicyIdFromUrl();
            const policyInfo = document.getElementById('policyInfo');
            
            if (!policyId) {
                policyInfo.innerHTML = `<i class="fas fa-file-contract"></i> Полис успешно оформлен`;
                return;
            }
            
            try {
                const response = await fetch(`http://localhost:3000/api/policies/id/${policyId}`);
                const data = await response.json();
                
                if (data.success && data.policy) {
                    policyInfo.innerHTML = `
                        <i class="fas fa-file-contract"></i> 
                        Номер полиса: <strong>${data.policy.policy_number || policyId}</strong>
                        <div style="font-size: 14px; margin-top: 8px;">
                            Сумма: ${data.policy.total_price_rub?.toLocaleString() || 0} ₽
                        </div>
                        <div style="font-size: 12px; margin-top: 5px; color: #52c41a;">
                            <i class="fas fa-check-circle"></i> Полис активен
                        </div>
                    `;
                } else {
                    policyInfo.innerHTML = `<i class="fas fa-file-contract"></i> Номер полиса: <strong>${policyId}</strong>`;
                }
            } catch (error) {
                console.error('Ошибка загрузки полиса:', error);
                policyInfo.innerHTML = `<i class="fas fa-file-contract"></i> Номер полиса: <strong>${policyId}</strong>`;
            }
        }
        
        document.addEventListener('DOMContentLoaded', function() {
            loadPolicyInfo();
        });
    </script>
</body>
</html>
